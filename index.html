<style>

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --card: #161616; --card2: #1c1c1c;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --green: #94dd26; --green-dim: rgba(148,221,38,0.12);
    --text: #f5f5f5; --muted: rgba(245,245,245,0.38); --muted2: rgba(245,245,245,0.6);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Sniglet', cursive; min-height: 100vh; }
  .app { max-width: 420px; margin: 0 auto; padding-bottom: 24px; }
  .tabs { display: flex; margin: 0 20px 20px; background: var(--card); border-radius: 10px; padding: 3px; gap: 3px; }
  .tab { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; color: var(--muted); font-family: 'Sniglet', cursive; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--green); color: #0a0a0a; }
  .header { padding: 28px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 26px; font-weight: 800; letter-spacing: 1px; }
  .logo span { color: var(--green); }
  .streak { display: flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border2); border-radius: 100px; padding: 6px 12px 6px 8px; font-size: 12px; color: var(--muted2); }
  .level-row { padding: 20px 20px 6px; display: flex; justify-content: space-between; align-items: baseline; }
  .level-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .level-num { font-size: 16px; color: var(--green); }
  .xp-wrap { padding: 0 20px 4px; }
  .xp-bg { height: 3px; background: var(--card2); border-radius: 2px; overflow: hidden; }
  .xp-fill { height: 100%; width: 0%; background: var(--green); border-radius: 2px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
  .xp-sub { padding: 6px 20px 18px; font-size: 10px; color: var(--muted); text-align: right; }
  .date-badge { margin: 0 20px 14px; display: flex; align-items: center; gap: 8px; }
  .date-pill { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 4px 10px; }
  .day-label { font-size: 10px; color: var(--green); }
  .daily-card { margin: 0 20px 14px; background: var(--card); border: 1px solid var(--border2); border-radius: 16px; padding: 18px; position: relative; overflow: hidden; }
  .daily-card::after { content: ''; position: absolute; top: 0; right: 0; width: 120px; height: 120px; background: radial-gradient(circle at top right, rgba(148,221,38,0.08), transparent 70%); pointer-events: none; }
  .daily-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--green); margin-bottom: 10px; }
  .live-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .daily-title { font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
  .daily-desc { font-size: 12px; color: var(--muted2); line-height: 1.5; margin-bottom: 16px; }
  .daily-row { display: flex; justify-content: space-between; align-items: center; }
  .xp-badge { font-size: 12px; color: var(--green); background: var(--green-dim); border: 1px solid rgba(148,221,38,0.2); border-radius: 100px; padding: 4px 10px; }
  .btn-go { background: var(--green); color: #0a0a0a; border: none; border-radius: 8px; padding: 9px 18px; font-family: 'Sniglet', cursive; font-size: 13px; cursor: pointer; transition: opacity 0.15s; }
  .btn-go:active { opacity: 0.75; }
  .btn-go.done { background: transparent; color: var(--green); border: 1px solid var(--green); cursor: default; }
  .section-label { padding: 0 20px 10px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .ch-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .ch-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .ch-card:active { opacity: 0.75; }
  .ch-card.done { border-color: rgba(148,221,38,0.2); background: rgba(148,221,38,0.04); }
  .ch-card.done .ch-name { color: var(--muted2); }
  .ch-card.done .ch-icon-wrap { background: var(--green-dim); }
  .ch-icon-wrap { width: 38px; height: 38px; border-radius: 10px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 13px; margin-bottom: 2px; }
  .ch-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .ch-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .ch-xp { font-size: 11px; color: var(--green); }
  .check-circle { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.2s; }
  .ch-card.done .check-circle { background: var(--green); border-color: var(--green); color: #0a0a0a; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
  .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 14px; }
  .stat-n { font-size: 36px; font-weight: 800; color: var(--green); line-height: 1; margin-bottom: 4px; }
  .stat-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .ach-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 0 20px; }
  .ach { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px; text-align: center; }
  .ach.unlocked { border-color: rgba(148,221,38,0.3); background: rgba(148,221,38,0.05); }
  .ach.locked { opacity: 0.3; }
  .ach-ico { font-size: 24px; display: block; margin-bottom: 6px; }
  .ach-n { font-size: 10px; color: var(--muted2); line-height: 1.3; }
  .undo-btn { background: none; border: none; font-family: 'Sniglet', cursive; font-weight: 800; font-size: 12px; color: var(--text); cursor: pointer; flex-shrink: 0; padding: 0 4px; line-height: 1; display: none; }
  .undo-btn:active { color: #e55; }
  .undo-btn.visible { display: inline-flex; align-items: center; }
  .panel { display: none; }
  .panel.active { display: block; }
  .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-70px); background: var(--green); color: #0a0a0a; padding: 9px 18px; border-radius: 100px; font-weight: 800; font-size: 13px; z-index: 999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; font-family: 'Sniglet', cursive; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>

      </div>
    </div>
    <div class="section-label">Sfide di oggi</div>
    <div class="ch-list" id="ch-list"></div>
  </div>

  <div id="tab-progressi" class="panel">
    <div class="stats-grid">

      <div class="stat-box"><div class="stat-n" id="s-lv">1</div><div class="stat-l">Livello</div></div>
    </div>
    <div class="section-label" style="padding-top:4px">Achievement</div>
    <div class="ach-grid" id="ach-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function getDaySeed() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

function seededPick(arr, seed, count) {
  const copy = [...arr]; const result = []; let s = seed;
  for (let i = 0; i < count && copy.length > 0; i++) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    result.push(copy.splice(Math.abs(s) % copy.length, 1)[0]);
  }
  return result;
}

const seed = getDaySeed();
const todayDaily = seededPick(allDaily, seed, 1)[0];
const todayChallenges = seededPick(allChallenges, seed + 1, 5);

// --- localStorage helpers ---
const TODAY_KEY = 'grind_day_' + seed;

function loadState() {
  const global = JSON.parse(localStorage.getItem('grind_global') || '{}');
  const daily  = JSON.parse(localStorage.getItem(TODAY_KEY)     || '{}');
  return {
    xp:         global.xp        ?? 0,
    level:      global.level     ?? 1,
    streak:     global.streak    ?? 0,
    done:       global.done      ?? 0,
    lastDay:    global.lastDay   ?? null,
    dailyDone:  daily.dailyDone  ?? false,
    chDone:     daily.chDone     ?? new Array(5).fill(false),
  };
}

function saveGlobal() {
  localStorage.setItem('grind_global', JSON.stringify({ xp, level, streak, done, lastDay }));
}

function saveDaily() {
  localStorage.setItem(TODAY_KEY, JSON.stringify({ dailyDone, chDone }));
}

// --- load saved state ---
let { xp, level, streak, done, lastDay, dailyDone, chDone } = loadState();

// streak reset if a day was skipped
const todayStr = String(seed);
if (lastDay !== null && lastDay !== todayStr && lastDay !== String(seed - 1)) {
  streak = 0;
}
lastDay = todayStr;
saveGlobal();

function setupDate() {
  const now = new Date();
  const days = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const months = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  document.getElementById('date-pill').textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('day-label').textContent = days[now.getDay()];
}

function setupDaily() {
  document.getElementById('daily-title').textContent = todayDaily.title;
  document.getElementById('daily-desc').textContent = todayDaily.desc;
  document.getElementById('daily-xp').textContent = '+' + todayDaily.xp + ' XP';
  if (dailyDone) {
    document.getElementById('daily-btn').textContent = '✓ Fatto!';
    document.getElementById('daily-btn').classList.add('done');
    document.getElementById('daily-undo').classList.add('visible');
  }
}

function renderChallenges() {
  document.getElementById('ch-list').innerHTML = todayChallenges.map((c, i) => {
    const d = chDone[i];
    return `<div class="ch-card${d?' done':''}" id="ch-${i}" onclick="completeChallenge(${i})">
      <div class="ch-icon-wrap">${c.icon}</div>
      <div class="ch-info">
        <div class="ch-name">${c.name}</div>
        <div class="ch-desc">${c.desc}</div>
      </div>
      <div class="ch-right" style="display:flex;align-items:center;gap:6px;">
        <button class="undo-btn${d?' visible':''}" onclick="event.stopPropagation();undoChallenge(${i})">✕</button>
        <div class="check-circle">${d?'✓':''}</div>
      </div>
    </div>`;
  }).join('');
}

const achievements = [
  {ico:'🚀',name:'Prima sfida',cond:(d)=>d>=1},

function renderAch() {
  document.getElementById('ach-grid').innerHTML = achievements.map(a => {
    const u = a.cond(done, streak, level);
    return `<div class="ach ${u?'unlocked':'locked'}"><span class="ach-ico">${a.ico}</span><div class="ach-n">${a.name}</div></div>`;
  }).join('');
}

function updateUI() {
  const xpMod = xp % 500;
  document.getElementById('xp-fill').style.width = (xpMod/500*100)+'%';
  document.getElementById('xp-cur').textContent = xpMod;
  document.getElementById('level-num').textContent = 'LV. '+level;
  document.getElementById('streak').textContent = streak;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('s-xp').textContent = xp;
  document.getElementById('s-lv').textContent = level;
  renderAch();
}

function addXP(amount) {
  xp += amount; done++; streak++;
  const newLv = Math.floor(xp/500)+1;
  if (newLv > level) { level = newLv; setTimeout(()=>showToast('🏆 Livello '+level+' sbloccato!'),700); }
  updateUI();
  saveGlobal();
}

function completeDaily() {
  if (dailyDone) return;
  dailyDone = true;
  document.getElementById('daily-btn').textContent = '✓ Fatto!';
  document.getElementById('daily-btn').classList.add('done');
  document.getElementById('daily-undo').classList.add('visible');
  addXP(todayDaily.xp);
  showToast('⚡ +'+todayDaily.xp+' XP!');
  saveDaily();
}

function completeChallenge(i) {
  if (chDone[i]) return;
  chDone[i] = true;
  addXP(todayChallenges[i].xp);
  showToast('⚡ +'+todayChallenges[i].xp+' XP!');
  renderChallenges();
  saveDaily();
}

function undoDaily() {
  if (!dailyDone) return;
  dailyDone = false;
  xp -= todayDaily.xp;
  if (xp < 0) xp = 0;
  done = Math.max(0, done - 1);
  streak = Math.max(0, streak - 1);
  level = Math.floor(xp/500) + 1;
  document.getElementById('daily-btn').textContent = 'Fatto';
  document.getElementById('daily-btn').classList.remove('done');
  document.getElementById('daily-undo').classList.remove('visible');
  updateUI();
  saveGlobal();
  saveDaily();
  showToast('↩ Sfida annullata');
}

function undoChallenge(i) {
  if (!chDone[i]) return;
  chDone[i] = false;
  xp -= todayChallenges[i].xp;
  if (xp < 0) xp = 0;
  done = Math.max(0, done - 1);
  streak = Math.max(0, streak - 1);
  level = Math.floor(xp/500) + 1;
  updateUI();
  saveGlobal();
  renderChallenges();
  saveDaily();
  showToast('↩ Sfida annullata');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

setupDate();
setupDaily();
renderChallenges();
setTimeout(updateUI, 150);
